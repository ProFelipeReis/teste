<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>Trainly — Bem-vindo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Firebase SDKs (compat) para login do Personal Trainer -->
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
  <link rel="icon" type="image/png" href="https://i.imgur.com/9DDa1Th.png">
  <link rel="apple-touch-icon" sizes="180x180" href="https://i.imgur.com/9DDa1Th.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Trainly">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #f5c800;
      --head: 'Nunito', sans-serif;
      --body: 'Plus Jakarta Sans', sans-serif;
      --r: 12px;
    }
    html, body { height: 100%; font-family: var(--body); overflow: hidden; background: #111110; }

    .screen {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
      display: none;
    }
    .screen.active { display: flex; }

    /* ══ SELEÇÃO ══ */
    #screen-selection {
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 80px;
      background: #f0f0ef;
      overflow: hidden;
      position: relative;
    }

    #bg-canvas { position: absolute; inset: 0; z-index: 0; pointer-events: none; }

    .content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 380px;
      padding: 0 24px;
    }

    .logo {
      height: 160px;
      width: auto;
      max-width: 100%;
      object-fit: contain;
      margin-bottom: 44px;
      filter: drop-shadow(0 4px 24px rgba(0,0,0,0.5));
      animation: fadeDown .6s cubic-bezier(.22,1,.36,1) both;
    }

    .welcome-label {
      font-family: var(--head);
      font-size: .72rem;
      font-weight: 800;
      color: rgba(255,255,255,0.65);
      text-transform: uppercase;
      letter-spacing: .18em;
      margin-bottom: 10px;
      animation: fadeDown .6s cubic-bezier(.22,1,.36,1) .1s both;
    }

    .welcome-title {
      font-family: var(--head);
      font-size: 1.45rem;
      font-weight: 900;
      color: #ffffff;
      text-align: center;
      line-height: 1.25;
      margin-bottom: 36px;
      animation: fadeDown .6s cubic-bezier(.22,1,.36,1) .15s both;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      animation: fadeUp .65s cubic-bezier(.22,1,.36,1) .25s both;
    }

    .choice-card {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 20px 22px;
      border-radius: 20px;
      cursor: pointer;
      text-decoration: none;
      transition: transform .18s cubic-bezier(.22,1,.36,1), box-shadow .18s;
      position: relative;
      overflow: hidden;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.28);
      box-shadow: 0 8px 32px rgba(0,0,0,0.30), 0 1.5px 0 rgba(255,255,255,0.18) inset;
    }

    .choice-card::before {
      content: '';
      position: absolute;
      inset: -4px;
      background:
        linear-gradient(180deg, rgba(0,0,0,0.25) 0%, rgba(0,0,0,0.08) 60%),
        url('https://i.imgur.com/Fjj25UX.jpeg') center/cover no-repeat fixed;
      filter: blur(14px);
      z-index: 0;
    }

    .choice-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.07);
      z-index: 1;
    }

    .choice-card.personal::after { background: rgba(10,10,8,0.20); }

    .card-shine {
      position: absolute;
      inset: 0;
      z-index: 2;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(255,255,255,0.13) 0%, transparent 55%);
      pointer-events: none;
    }

    .choice-card.personal {
      border-color: rgba(255,255,255,0.22);
      box-shadow: 0 8px 32px rgba(0,0,0,0.45), 0 1.5px 0 rgba(255,255,255,0.14) inset;
    }

    .choice-card:hover {
      transform: translateY(-3px) scale(1.01);
      box-shadow: 0 16px 48px rgba(0,0,0,0.55), 0 1.5px 0 rgba(255,255,255,0.14) inset;
    }

    .choice-card:active { transform: translateY(0) scale(0.99); }

    .card-text, .card-arrow, .card-shine { position: relative; z-index: 3; }
    .card-text { flex: 1; }

    .card-title {
      font-family: var(--head);
      font-size: 1.08rem;
      font-weight: 800;
      color: #ffffff;
      margin-bottom: 3px;
    }

    .card-sub {
      font-size: .78rem;
      font-weight: 500;
      color: rgba(255,255,255,0.68);
    }

    .card-arrow {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.30);
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.90);
      flex-shrink: 0;
      transition: background .18s, transform .18s;
    }

    .choice-card:hover .card-arrow {
      background: rgba(255,255,255,0.28);
      transform: translateX(2px);
    }

    /* ══ LOGIN SCREENS ══ */
    #screen-login-trainer,
    #screen-login-aluno {
      align-items: flex-start;
      justify-content: center;
      padding: calc(80px + env(safe-area-inset-top)) 24px 24px;
      background: #000000;
      overflow: hidden;
      position: relative;
    }

    .login-bg-canvas {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .login-card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 340px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.28);
      border-radius: 24px;
      padding: 36px 32px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.30), 0 1.5px 0 rgba(255,255,255,0.18) inset;
      overflow: hidden;
    }

    .login-card::before {
      content: '';
      position: absolute;
      inset: -4px;
      background:
        linear-gradient(180deg, rgba(0,0,0,0.50) 0%, rgba(0,0,0,0.25) 60%),
        url('https://i.imgur.com/Fjj25UX.jpeg') center/cover no-repeat fixed;
      filter: blur(14px);
      z-index: 0;
    }

    .login-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(10,10,8,0.28);
      z-index: 1;
    }

    .login-card > * { position: relative; z-index: 3; }

    .login-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 340px;
      position: relative;
      z-index: 2;
    }

    .login-logo {
      height: 160px;
      width: auto;
      max-width: 100%;
      object-fit: contain;
      margin-bottom: 44px;
      filter: drop-shadow(0 4px 24px rgba(0,0,0,0.5));
    }

    .form-group { margin-bottom: 16px; }

    .form-group label {
      display: block;
      font-size: .75rem;
      font-weight: 700;
      color: rgba(255,255,255,0.80);
      margin-bottom: 7px;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .form-control {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid rgba(255,255,255,0.22);
      border-radius: var(--r);
      font-size: .9rem;
      background: rgba(255,255,255,0.14);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: #ffffff;
      transition: all .2s;
      font-family: var(--body);
    }

    .form-control::placeholder { color: rgba(255,255,255,0.38); }

    .form-control:focus {
      outline: none;
      border-color: rgba(255,255,255,0.55);
      background: rgba(255,255,255,0.22);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.10);
      color: #ffffff;
    }

    .btn-login-submit {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 13px;
      margin-top: 4px;
      border-radius: var(--r);
      font-size: .95rem;
      font-weight: 800;
      background: linear-gradient(135deg, #3d3830 0%, #28231a 50%, #1a1610 100%);
      color: #ffffff;
      cursor: pointer;
      border: 1px solid rgba(245,200,0,.18);
      transition: all .15s;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
      font-family: var(--body);
    }

    .btn-login-submit:hover {
      transform: translateY(-1px);
      background: linear-gradient(135deg, #4d4838 0%, #332d20 50%, #221d14 100%);
    }

    .btn-login-submit:disabled { opacity: .4; pointer-events: none; }

    .login-error {
      color: #ffaaaa;
      font-size: .8rem;
      font-weight: 600;
      min-height: 20px;
      margin-bottom: 12px;
    }

    .btn-back-profile {
      position: absolute;
      bottom: 28px;
      left: 24px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 50px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.22);
      color: rgba(255,255,255,0.80);
      font-family: var(--body);
      font-size: .78rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      transition: all .2s cubic-bezier(.22,1,.36,1);
    }

    .btn-back-profile:hover {
      background: rgba(255,255,255,0.20);
      color: #fff;
      transform: translateY(-2px);
    }

    .login-register-link {
      margin-top: 18px;
      text-align: center;
    }

    .login-register-link button {
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--body);
      font-size: .84rem;
      color: rgba(255,255,255,0.65);
      transition: color .15s;
    }

    .login-register-link button span {
      color: #ffffff;
      font-weight: 700;
      text-decoration: underline;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (hover: none) and (pointer: coarse) {
      * {
        -webkit-user-select: none !important;
        -moz-user-select: none !important;
        user-select: none !important;
        -webkit-touch-callout: none !important;
      }
    }
  </style>
</head>
<body>

<!-- ══ SELEÇÃO DE PERFIL ══ -->
<div id="screen-selection" class="screen active">
  <canvas id="bg-canvas"></canvas>
  <div class="content">
    <img src="https://i.imgur.com/orva0oM.png" alt="Trainly" class="logo"/>
    <div class="welcome-label">Bem-vindo ao Trainly</div>
    <div class="welcome-title">Quem é você?</div>
    <div class="cards">
      <div class="choice-card personal" onclick="showLoginTrainer()">
        <div class="card-shine"></div>
        <div class="card-text">
          <div class="card-title">Personal Trainer</div>
          <div class="card-sub">Gerencie alunos e treinos</div>
        </div>
        <div class="card-arrow">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </div>
      </div>
      <div class="choice-card" onclick="showLoginAluno()">
        <div class="card-shine"></div>
        <div class="card-text">
          <div class="card-title">Aluno</div>
          <div class="card-sub">Acesse seus treinos e evolução</div>
        </div>
        <div class="card-arrow">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ══ LOGIN PERSONAL TRAINER ══ -->
<div id="screen-login-trainer" class="screen">
  <canvas class="login-bg-canvas" id="canvas-trainer"></canvas>
  <button class="btn-back-profile" onclick="showSelection()">
    <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Trocar perfil
  </button>
  <div class="login-wrap">
    <img src="https://i.imgur.com/orva0oM.png" alt="Trainly" class="login-logo"/>
    <div class="login-card" style="width:100%;">
      <div style="position:absolute;inset:0;z-index:2;border-radius:24px;background:linear-gradient(135deg,rgba(255,255,255,0.13) 0%,transparent 55%);pointer-events:none;"></div>
      <form id="trainer-login-form" onsubmit="return false;">
        <div class="form-group"><label>Usuário</label><input id="trainer-login-user" class="form-control" type="text" placeholder="Usuário" required autocomplete="username"/></div>
        <div class="form-group"><label>Senha</label><input id="trainer-login-pass" class="form-control" type="password" placeholder="••••••••" required autocomplete="current-password"/></div>
        <div class="login-error" id="trainer-login-error"></div>
        <button type="button" id="trainer-login-btn" class="btn-login-submit" onclick="doTrainerLogin()">Acessar painel →</button>
      </form>
    </div>
    <div class="login-register-link">
      <button onclick="window.location.href='https://trainly.online/app?register=1'">Novo aqui? <span>Criar conta</span></button>
    </div>
  </div>
</div>

<!-- ══ LOGIN ALUNO ══ -->
<div id="screen-login-aluno" class="screen">
  <canvas class="login-bg-canvas" id="canvas-aluno"></canvas>
  <button class="btn-back-profile" onclick="showSelection()">
    <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Trocar perfil
  </button>
  <div class="login-wrap">
    <img src="https://i.imgur.com/orva0oM.png" alt="Trainly" class="login-logo"/>
    <div class="login-card" style="width:100%;">
      <div style="position:absolute;inset:0;z-index:2;border-radius:24px;background:linear-gradient(135deg,rgba(255,255,255,0.13) 0%,transparent 55%);pointer-events:none;"></div>
      <form id="aluno-login-form" onsubmit="doAlunoLogin(event)">
        <div class="form-group">
          <label>Código de acesso</label>
          <input id="aluno-login-code" class="form-control" type="text" placeholder="Ex: AB3X7K" maxlength="6" autocomplete="off" style="text-transform:uppercase;letter-spacing:.18em;font-size:1.2rem;text-align:center;font-weight:700;color:#ffffff;"/>
        </div>
        <div class="login-error" id="aluno-login-error"></div>
        <button type="submit" id="aluno-login-btn" class="btn-login-submit">Acessar ficha →</button>
      </form>
    </div>
  </div>
</div>

<script>
// ══ SCREEN SWITCHER ══
function showScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById(id).classList.add('active');
}
function showSelection(){ showScreen('screen-selection'); }

function showLoginTrainer(){
  try{localStorage.setItem('trainly_role','trainer');}catch(e){}
  showScreen('screen-login-trainer');
  startLoginCanvas('canvas-trainer');
  setTimeout(function(){var u=document.getElementById('trainer-login-user');if(u)u.focus();},100);
}

function showLoginAluno(){
  try{localStorage.setItem('trainly_role','aluno');}catch(e){}
  showScreen('screen-login-aluno');
  startLoginCanvas('canvas-aluno');
  setTimeout(function(){var c=document.getElementById('aluno-login-code');if(c)c.focus();},100);
}

// ── Auto-redirect ──
(function(){
  try{
    // Sessão trainer salva? → vai direto pro dashboard
    var ts=localStorage.getItem('forge_gestor_session');
    if(ts){try{var s=JSON.parse(ts);if(s&&s.username){window.location.replace('https://trainly.online/app');return;}}catch(e){}}
    // Sessão aluno salva? → vai direto pro dashboard
    var as=localStorage.getItem('forge_student_session');
    if(as){try{var a=JSON.parse(as);if(a&&a.id){window.location.replace('https://trainly.online/aluno');return;}}catch(e){}}
    // Sem sessão → sempre tela de seleção (ignora ?role= e ?choose=)
    showSelection();
  }catch(e){}
})();

// ══ CANVAS LOGIN ══
var _canvasInited={};
function startLoginCanvas(canvasId){
  if(_canvasInited[canvasId])return;
  _canvasInited[canvasId]=true;
  var canvas=document.getElementById(canvasId);if(!canvas)return;
  var ctx=canvas.getContext('2d');
  var W,H,squares,animId;
  var bgImg=new Image();bgImg.crossOrigin='anonymous';bgImg.src='https://i.imgur.com/Fjj25UX.jpeg';
  var bgLoaded=false;bgImg.onload=function(){bgLoaded=true;};
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  function mkSquare(){var sz=28+Math.random()*68;return{x:Math.random()*W,y:Math.random()*H,size:sz,rot:Math.random()*Math.PI*2,rotSpeed:(Math.random()-0.5)*0.007,alpha:0.05+Math.random()*0.12,dx:(Math.random()-0.5)*0.35,dy:-(0.25+Math.random()*0.45)};}
  function getDY(px){return H*1.05+(px/W)*(H*0.82-H*1.05);}
  function isAbove(px,py){return py<getDY(px);}
  function drawBg(){
    var lY=getDY(0),rY=getDY(W);
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(W,0);ctx.lineTo(W,rY);ctx.lineTo(0,lY);ctx.closePath();ctx.fillStyle='#111110';ctx.fill();
    ctx.beginPath();ctx.moveTo(0,lY);ctx.lineTo(W,rY);ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fillStyle='#f0f0ef';ctx.fill();
    if(bgLoaded){ctx.save();ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(W,0);ctx.lineTo(W,rY);ctx.lineTo(0,lY);ctx.closePath();ctx.clip();var iw=bgImg.naturalWidth,ih=bgImg.naturalHeight,sc=Math.max(W/iw,Math.max(lY,rY)/ih),dw=iw*sc,dh=ih*sc,dx=(W-dw)/2,dy=-dh*0.05;ctx.globalAlpha=0.22;ctx.drawImage(bgImg,dx,dy,dw,dh);ctx.globalAlpha=1;ctx.restore();}
    ctx.beginPath();ctx.moveTo(0,lY);ctx.lineTo(W,rY);ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=1.5;ctx.stroke();
  }
  function drawSq(s){var ab=isAbove(s.x,s.y);ctx.save();ctx.translate(s.x,s.y);ctx.rotate(s.rot);ctx.globalAlpha=s.alpha;ctx.strokeStyle=ab?'rgba(255,255,255,0.18)':'rgba(17,17,16,0.22)';ctx.fillStyle=ab?'rgba(46,46,42,0.30)':'rgba(46,46,42,0.08)';ctx.lineWidth=1.5;ctx.beginPath();ctx.rect(-s.size/2,-s.size/2,s.size,s.size);ctx.fill();ctx.stroke();ctx.restore();}
  function step(){ctx.clearRect(0,0,W,H);drawBg();squares.forEach(function(s){s.x+=s.dx;s.y+=s.dy;s.rot+=s.rotSpeed;if(s.y+s.size<0){s.y=H+s.size;s.x=Math.random()*W;}if(s.x-s.size>W)s.x=-s.size;if(s.x+s.size<0)s.x=W+s.size;drawSq(s);});animId=requestAnimationFrame(step);}
  resize();squares=Array.from({length:40},mkSquare);step();
  window.addEventListener('resize',resize);
}

// ══ CANVAS SELEÇÃO ══
(function(){
  var canvas=document.getElementById('bg-canvas');var ctx=canvas.getContext('2d');
  var W,H,squares;
  var bgImg=new Image();bgImg.crossOrigin='anonymous';bgImg.src='https://i.imgur.com/Fjj25UX.jpeg';
  var bgLoaded=false;bgImg.onload=function(){bgLoaded=true;};
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  function mkSquare(){var sz=28+Math.random()*68;return{x:Math.random()*W,y:Math.random()*H,size:sz,rot:Math.random()*Math.PI*2,rotSpeed:(Math.random()-0.5)*0.007,alpha:0.05+Math.random()*0.12,dx:(Math.random()-0.5)*0.35,dy:-(0.25+Math.random()*0.45)};}
  function getDY(px){return H*1.05+(px/W)*(H*0.82-H*1.05);}
  function isAbove(px,py){return py<getDY(px);}
  function drawBg(){
    var lY=getDY(0),rY=getDY(W);
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(W,0);ctx.lineTo(W,rY);ctx.lineTo(0,lY);ctx.closePath();ctx.fillStyle='#111110';ctx.fill();
    if(bgLoaded){ctx.save();ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(W,0);ctx.lineTo(W,rY);ctx.lineTo(0,lY);ctx.closePath();ctx.clip();var iw=bgImg.naturalWidth,ih=bgImg.naturalHeight,sc=Math.max(W/iw,Math.max(lY,rY)/ih),dw=iw*sc,dh=ih*sc,dx=(W-dw)/2,dy=-dh*0.05;ctx.globalAlpha=0.22;ctx.drawImage(bgImg,dx,dy,dw,dh);ctx.globalAlpha=1;ctx.restore();}
    ctx.beginPath();ctx.moveTo(0,lY);ctx.lineTo(W,rY);ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=1.5;ctx.stroke();
  }
  function drawSq(s){var ab=isAbove(s.x,s.y);ctx.save();ctx.translate(s.x,s.y);ctx.rotate(s.rot);ctx.globalAlpha=s.alpha;ctx.strokeStyle=ab?'rgba(255,255,255,0.18)':'rgba(17,17,16,0.22)';ctx.fillStyle=ab?'rgba(46,46,42,0.30)':'rgba(46,46,42,0.08)';ctx.lineWidth=1.5;ctx.beginPath();ctx.rect(-s.size/2,-s.size/2,s.size,s.size);ctx.fill();ctx.stroke();ctx.restore();}
  function step(){ctx.clearRect(0,0,W,H);drawBg();squares.forEach(function(s){s.x+=s.dx;s.y+=s.dy;s.rot+=s.rotSpeed;if(s.y+s.size<0){s.y=H+s.size;s.x=Math.random()*W;}if(s.x-s.size>W)s.x=-s.size;if(s.x+s.size<0)s.x=W+s.size;drawSq(s);});requestAnimationFrame(step);}
  resize();squares=Array.from({length:40},mkSquare);step();
  window.addEventListener('resize',resize);
})();

function _authEmail(u){return u.toLowerCase().replace(/[^a-z0-9]/g,'')+'@trainly-app.internal';}
function _tsToMs(v){if(!v)return null;if(typeof v==='number')return v;if(typeof v.toMillis==='function')return v.toMillis();if(typeof v.seconds==='number')return v.seconds*1000;return Number(v)||null;}
function _checkSub(mgr){var now=Date.now(),tMs=_tsToMs(mgr.trialEndsAt),sMs=_tsToMs(mgr.subEndsAt);if(tMs&&now<tMs)return{ok:true,type:'trial',daysLeft:Math.ceil((tMs-now)/86400000)};if(sMs&&now<sMs)return{ok:true,type:'active',daysLeft:Math.ceil((sMs-now)/86400000)};return{ok:false,type:'expired'};}
function _isTester(mgr){if(!mgr.isTester)return false;var e=_tsToMs(mgr.testerEndsAt);return !e||e>Date.now();}

async function doTrainerLogin(){
  var user=document.getElementById('trainer-login-user').value.trim().toLowerCase();
  var pass=document.getElementById('trainer-login-pass').value;
  var errEl=document.getElementById('trainer-login-error');
  var btn=document.getElementById('trainer-login-btn');
  errEl.textContent='';
  if(!user||!pass){errEl.textContent='Preencha usuário e senha.';return;}
  btn.textContent='Verificando...';btn.disabled=true;
  try{
    var att=0;
    while((!window.firebase||!window.firebase.firestore||!_auth)&&att<40){await new Promise(function(r){setTimeout(r,100);});att++;}
    if(!window.firebase||!window.firebase.firestore||!_auth){errEl.textContent='Erro de conexão. Tente novamente.';return;}
    try{await _auth.signInWithEmailAndPassword(_authEmail(user),pass);}
    catch(ae){
      if(ae.code==='auth/wrong-password'||ae.code==='auth/invalid-credential'||ae.code==='auth/user-not-found'){errEl.textContent='Usuário ou senha incorretos.';}
      else{errEl.textContent='Erro: '+ae.message;}
      return;
    }
    var db=firebase.firestore();
    var snap=await db.collection('managers').where('username','==',user).get();
    if(snap.empty){await _auth.signOut();errEl.textContent='Usuário ou senha incorretos.';return;}
    var docSnap=snap.docs[0];var mgr=docSnap.data();
    if(mgr.blocked){await _auth.signOut();errEl.textContent='Conta bloqueada. Entre em contato com o suporte.';return;}
    var role=mgr.role||(mgr.isMaster?'master':'comum');
    var subStatus=(role!=='ceo')?_checkSub(mgr):null;
    var referralCode=mgr.referralCode||'';
    if(!referralCode){var arr=new Uint8Array(5);crypto.getRandomValues(arr);referralCode=Array.from(arr).map(function(b){return b.toString(16).padStart(2,'0');}).join('');try{await db.collection('managers').doc(docSnap.id).update({referralCode:referralCode});}catch(e){}}
    var userData={id:docSnap.id,username:user,role:role,isMaster:role==='master'||role==='ceo',isCeo:role==='ceo',isTester:_isTester(mgr),displayName:mgr.name||user,phone:mgr.phone||'',subStatus:subStatus,trialEndsAt:mgr.trialEndsAt||null,subEndsAt:mgr.subEndsAt||null,referralCode:referralCode};
    try{localStorage.setItem('forge_gestor_session',JSON.stringify(userData));}catch(e){}
    try{localStorage.setItem('trainly_role','trainer');}catch(e){}
    window.location.replace('https://trainly.online/app');
  }catch(e){errEl.textContent='Erro: '+e.message;}
  finally{btn.textContent='Acessar painel →';btn.disabled=false;}
}

async function doAlunoLogin(e){
